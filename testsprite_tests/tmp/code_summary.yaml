version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js
  - Tailwind CSS (Vanilla CSS for core)
  - Motion (Framer Motion)
  - Supabase
  - React Three Fiber (3D elements)
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Homepage with Hero and Pulse indicators.
  - path: /projects
    file: src/app/projects/page.tsx
    auth_required: false
    description: Portfolio projects showcase.
  - path: /achievements
    file: src/app/achievements/page.tsx
    auth_required: false
    description: Certificates and awards page.
  - path: /about
    file: src/app/about/page.tsx
    auth_required: false
    description: Personal bio and tech stack.
  - path: /contact
    file: src/app/contact/page.tsx
    auth_required: false
    description: Contact form and social links.
  - path: /dashboard
    file: src/app/dashboard/page.tsx
    auth_required: false
    description: Pulse Living Feed dashboard.
features:
  - name: Multilingual Support (i18n)
    description: Toggle between English and Indonesian.
    files:
      - src/i18n/en.ts
      - src/i18n/id.ts
      - src/store/languageStore.ts
    entry_route: /
    user_interactions:
      - Click EN/ID toggle in Navbar.
    auth_required: false
  - name: Living Feed Dashboard
    description: Real-time system status and activity feed.
    files:
      - src/app/dashboard/page.tsx
    entry_route: /dashboard
    auth_required: false
known_limitations:
  - issue: Achievements data fails to load due to potential schema mismatch.
    location: src/app/achievements/page.tsx
    impact: Achievements page shows "No achievements found".

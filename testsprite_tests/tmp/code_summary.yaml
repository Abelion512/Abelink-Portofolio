version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js (App Router)
  - Tailwind CSS
  - Framer Motion (motion/react)
  - Lucide React
  - Supabase
  - NextAuth.js
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Home page with Hero and sections
  - path: /projects
    file: src/app/projects/page.tsx
    auth_required: false
    description: Projects gallery
  - path: /about
    file: src/app/about/page.tsx
    auth_required: false
    description: About page with Bio Toggle
  - path: /guestbook
    file: src/app/guestbook/page.tsx
    auth_required: false
    description: Guestbook with Supabase integration
  - path: /chat
    file: src/app/chat/page.tsx
    auth_required: false
    description: AI Chat interface
features:
  - name: Global Navigation
    description: Premium Navbar with 7 nav items and mobile responsiveness
    files:
      - src/components/layout/Navbar.tsx
    entry_route: /
    user_interactions:
      - Scroll to see glass effect
      - Click nav items to navigate
      - Open mobile hamburger menu on small screens
  - name: Hero Profile
    description: Animated hero section with parallax and status
    files:
      - src/components/sections/Hero.tsx
    entry_route: /
    user_interactions:
      - Hover to see parallax effect on orbs
      - Click social links
  - name: Guestbook
    description: Message board using Supabase Realtime
    files:
      - src/components/guestbook/GuestbookForm.tsx
    entry_route: /guestbook
    user_interactions:
      - Fill name and message
      - Click Send to submit
      - See message list update
    api_calls:
      - method: POST
        endpoint: supabase guestbook table
  - name: AI Chat
    description: Chatbot interface for Abelion AI
    files:
      - src/components/guestbook/ChatClient.tsx
    entry_route: /chat
    user_interactions:
      - Type message in input
      - Send message to AI
      - View AI streaming response
known_limitations: []
